<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>March Madness Model Report</title>
    <!-- Link to CSS specific for report styling -->

</head>
<body>

<!-- Navigation menu -->
<nav>
